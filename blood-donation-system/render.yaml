services:
  - type: web
    name: bloodlink
    env: node
    region: singapore        # Closest free region to India
    plan: free
    buildCommand: "npm install --prefix server && npm run build --prefix server"
    startCommand: "node server/server.js"
    envVars:
      - key: NODE_ENV
        value: production
      # DB_HOST, DB_PORT, DB_USER, DB_PASSWORD — set these manually in the
      # Render dashboard after getting Aiven connection details.
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: blood_donation_db
      - key: DB_SSL
        value: "true"          # Required for Aiven cloud MySQL
      - key: JWT_SECRET
        generateValue: true    # Render auto-generates a secure random secret
